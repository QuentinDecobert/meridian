<svg viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glow" cx="0.82" cy="0.18" r="0.6">
      <stop offset="0%"  stop-color="#E8A35C" stop-opacity="0.16"/>
      <stop offset="70%" stop-color="#E8A35C" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Full dark-teal background with a warm glow upper-right -->
  <rect width="1280" height="640" fill="#0C1E1C"/>
  <rect width="1280" height="640" fill="url(#glow)"/>

  <!-- Mark on the left · same geometry as the square tile, without the tile
       (the banner IS the tile) -->
  <g transform="translate(96, 120)">
    <path d="M 96 340 A 160 160 0 0 1 416 340"
          fill="none" stroke="#F4EDD8" stroke-opacity="0.28"
          stroke-width="28" stroke-linecap="round"/>
    <path d="M 96 340 A 160 160 0 0 1 207 188"
          fill="none" stroke="#F4EDD8"
          stroke-width="28" stroke-linecap="round"/>
    <circle cx="207" cy="188" r="24" fill="#E8A35C"/>
  </g>

  <!-- Wordmark + tagline -->
  <g fill="#F4EDD8" font-family="'IBM Plex Sans Condensed', 'Helvetica Neue', Helvetica, sans-serif">
    <text x="640" y="320" font-weight="700" font-size="128" letter-spacing="-4">Meridian</text>
  </g>
  <g fill="#F4EDD8" fill-opacity="0.55"
     font-family="'JetBrains Mono', Menlo, monospace">
    <text x="640" y="380" font-weight="500" font-size="22" letter-spacing="4">A PERIPHERAL COCKPIT FOR BUILDERS</text>
    <text x="640" y="412" font-weight="500" font-size="22" letter-spacing="4">WORKING WITH CLAUDE</text>
  </g>
</svg>
