name: Meridian

options:
  bundleIdPrefix: com.quentindecobert
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    MARKETING_VERSION: "0.4.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: 8D27N9APKZ
    GCC_TREAT_WARNINGS_AS_ERRORS: YES
    SWIFT_TREAT_WARNINGS_AS_ERRORS: YES

targets:
  Meridian:
    type: application
    platform: macOS
    sources:
      - path: Sources
      - path: Resources/Fonts
        type: folder
        buildPhase: resources
    info:
      path: Sources/App/Info.plist
      properties:
        LSUIElement: YES
        CFBundleDisplayName: Meridian
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSHumanReadableCopyright: "© 2026 Quentin Decobert"
        NSHighResolutionCapable: YES
        ATSApplicationFontsPath: "Fonts/"
        MeridianBuildSHA: ""
    entitlements:
      path: Sources/App/Meridian.entitlements
    settings:
      base:
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_STYLE: Automatic
        PRODUCT_BUNDLE_IDENTIFIER: com.quentindecobert.meridian
        PRODUCT_MODULE_NAME: Meridian
        INFOPLIST_KEY_LSUIElement: YES
        INFOPLIST_KEY_NSHighResolutionCapable: YES
    postCompileScripts:
      - name: Inject build SHA into Info.plist
        script: |
          set -euo pipefail
          PLIST="$TARGET_BUILD_DIR/$INFOPLIST_PATH"
          if [ ! -f "$PLIST" ]; then
            echo "warning: Info.plist not found at $PLIST — skipping SHA injection"
            exit 0
          fi
          SHA=""
          if command -v git >/dev/null 2>&1; then
            SHA=$(cd "$SRCROOT" && git rev-parse HEAD 2>/dev/null || true)
          fi
          # Empty SHA is a valid sentinel: the runtime checker treats it as
          # "no SHA available" and simply disables the update check.
          /usr/libexec/PlistBuddy -c "Set :MeridianBuildSHA $SHA" "$PLIST" \
            || /usr/libexec/PlistBuddy -c "Add :MeridianBuildSHA string $SHA" "$PLIST"
          echo "MeridianBuildSHA = ${SHA:-<empty>}"
        basedOnDependencyAnalysis: false

  MeridianTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/MeridianTests
    dependencies:
      - target: Meridian
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.quentindecobert.meridian.tests
        PRODUCT_MODULE_NAME: MeridianTests
        GENERATE_INFOPLIST_FILE: YES
