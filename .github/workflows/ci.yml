name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege (MER-SEC-011): default permissions at the repo or org
# level may grant `contents: write`, which CI doesn't need.
permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & test
    runs-on: macos-15
    timeout-minutes: 15

    steps:
      # Pin third-party actions by SHA to block a malicious retag of the `v4`
      # tag pointer (CWE-829, MER-SEC-011). Update via Dependabot
      # `package-ecosystem: github-actions`.
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Meridian.xcodeproj
        run: xcodegen generate

      - name: Build (Debug, unsigned)
        run: |
          xcodebuild \
            -project Meridian.xcodeproj \
            -scheme Meridian \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Test
        run: |
          xcodebuild \
            -project Meridian.xcodeproj \
            -scheme Meridian \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            test
